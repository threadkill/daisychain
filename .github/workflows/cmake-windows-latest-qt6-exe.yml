name: Build and Release Qt6 Windows Application Installer

on:
  push:
    branches:
      - master
    tags:
      - 'v*'  # Triggers on tags like v1.0.0
  pull_request:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtbase

      - name: Set up CMake
        uses: actions/setup-cmake@v3

      - name: Configure CMake
        run: |
          cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=C:\Qt\6.7.2\msvc2019_64 \
          -DCMAKE_INSTALL_PREFIX=C:\Temp\DaisyChain

      - name: Build and Install
        run: cmake --build build --target install --config Release -- /m

      - name: Package with CPack
        run: cmake --build build --target run_cpack --config Release -j

      - name: Rename Executable with Tag Version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv build/DaisyChain-1.0.0-win64.exe build/DaisyChain-${VERSION}-win64.exe

      - name: Upload Artifact for Debugging (optional)
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: Build-Output
          path: build/

  release:
    needs: build-windows
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: Build-Output

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/DaisyChain-${{ github.ref_name }}-win64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

